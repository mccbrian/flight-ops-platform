global:
  scrape_interval: 15s

scrape_configs:

  - job_name: ingestion-service

    metrics_path: /actuator/prometheus

    static_configs:
      - targets:
          - host.docker.internal:8081

  - job_name: processing-service

    metrics_path: /actuator/prometheus

    static_configs:
      - targets:
          - host.docker.internal:8082